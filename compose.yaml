services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecoride-react:dev
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: 'true'

volumes:
  frontend_node_modules:
